<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#0a0e17;color:#fff;padding:20px}
        .card{background:#0f1520;border-radius:12px;padding:20px;margin-bottom:20px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #1e2d45}
        button{background:#00d4ff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;margin:2px}
        .btn-danger{background:#ff4757;color:#fff}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:20px}
        .stat{background:#0f1520;padding:16px;border-radius:12px;text-align:center}
        .stat-value{font-size:28px;font-weight:700;color:#00d4ff}
        input,select,textarea{background:#0a0e17;border:1px solid #1e2d45;padding:8px;border-radius:8px;color:#fff;width:100%}
        .login-box{max-width:400px;margin:100px auto}
        .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;margin-right:4px;cursor:pointer}
        .tag-verified{background:#00d4ff20;color:#00d4ff}
        .tag-scam{background:#ff475720;color:#ff4757}
        .tag-fake{background:#f5a62320;color:#f5a623}
        .tag-bot{background:#a55eea20;color:#a55eea}
        .tag.selected{background:#2b88d8;color:#fff}
        .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
        .tab{padding:8px 16px;cursor:pointer;border-radius:20px;background:#0a0e17}
        .tab.active{background:#00d4ff;color:#000}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .admin-banner-preview{background:#2b5278;padding:8px;border-radius:8px;margin-top:8px;text-align:center}
    </style>
</head>
<body>
<div id="loginBox" class="card login-box">
    <h2>Admin Panel</h2>
    <input type="password" id="adminPass" style="margin:12px 0">
    <button onclick="adminLogin()">Войти</button>
    <div id="loginError" style="color:#ff4757"></div>
</div>
<div id="adminPanel" style="display:none">
    <div class="stats" id="stats"></div>
    
    <div class="tabs">
        <div class="tab active" onclick="showTab('users')">👥 Пользователи</div>
        <div class="tab" onclick="showTab('reports')">🚨 Жалобы</div>
        <div class="tab" onclick="showTab('appeals')">📝 Апелляции</div>
        <div class="tab" onclick="showTab('bot')">📢 @TelegramNotifications</div>
        <div class="tab" onclick="showTab('banner')">📢 Глобальный баннер</div>
        <div class="tab" onclick="showTab('chats')">📢 Каналы</div>
    </div>
    
    <div id="tab-users" class="tab-content active">
        <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;margin-bottom:16px">
                <h3>👥 Пользователи</h3>
                <input type="text" id="searchUsers" placeholder="Поиск..." oninput="filterUsers()" style="width:200px;margin:0">
            </div>
            <div id="usersList"></div>
        </div>
    </div>
    
    <div id="tab-reports" class="tab-content">
        <div class="card"><h3>🚨 Жалобы</h3><div id="reportsList"></div></div>
    </div>
    
    <div id="tab-appeals" class="tab-content">
        <div class="card"><h3>📝 Апелляции от @SpamInfoBot</h3><div id="appealsList"></div></div>
    </div>
    
    <div id="tab-bot" class="tab-content">
        <div class="card">
            <h3>📢 @TelegramNotifications <span style="color:#4dba87">✅ Официальный бот</span></h3>
            <div style="margin-top:16px">
                <select id="notifyUser" style="width:100%;margin-bottom:12px">
                    <option value="">Выберите пользователя</option>
                </select>
                <input type="text" id="notifyTitle" placeholder="Заголовок уведомления" style="width:100%;margin-bottom:12px">
                <textarea id="notifyMessage" placeholder="Текст уведомления" rows="3" style="width:100%;margin-bottom:12px"></textarea>
                <button onclick="sendBotNotification()">📨 Отправить уведомление</button>
            </div>
        </div>
    </div>
    
    <div id="tab-banner" class="tab-content">
        <div class="card">
            <h3>📢 Глобальный баннер (плашка над чатами)</h3>
            <div style="margin-top:16px">
                <input type="text" id="bannerText" placeholder="Текст баннера" style="width:100%;margin-bottom:12px">
                <input type="text" id="bannerLink" placeholder="Ссылка (опционально)" style="width:100%;margin-bottom:12px">
                <button onclick="saveBanner()">💾 Сохранить баннер</button>
                <div id="bannerPreview" class="admin-banner-preview" style="margin-top:12px"></div>
            </div>
        </div>
    </div>
    
    <div id="tab-chats" class="tab-content">
        <div class="card"><h3>📢 Каналы и группы</h3><div id="chatsList"></div></div>
    </div>
</div>

<script>
const API_URL = '';
let allUsers = [];

async function adminLogin() {
    if(document.getElementById('adminPass').value === 'admin2024') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadStats(); loadUsers(); loadReports(); loadAppeals(); loadChats(); loadUserSelect(); loadBanner();
    } else { document.getElementById('loginError').innerText = 'Неверный пароль'; }
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
}

async function loadBanner() {
    const res = await fetch(`${API_URL}/api/banner`);
    const banner = await res.json();
    document.getElementById('bannerText').value = banner.text || '';
    document.getElementById('bannerLink').value = banner.link || '';
    updateBannerPreview();
}

function updateBannerPreview() {
    const text = document.getElementById('bannerText').value;
    const link = document.getElementById('bannerLink').value;
    const preview = document.getElementById('bannerPreview');
    if(text) {
        if(link) preview.innerHTML = `<a href="${link}" target="_blank" style="color:#fff;text-decoration:none">📢 ${text}</a>`;
        else preview.innerHTML = `📢 ${text}`;
    } else {
        preview.innerHTML = '<em style="color:#aaa">Баннер не отображается</em>';
    }
}

document.getElementById('bannerText').addEventListener('input', updateBannerPreview);
document.getElementById('bannerLink').addEventListener('input', updateBannerPreview);

async function saveBanner() {
    const text = document.getElementById('bannerText').value;
    const link = document.getElementById('bannerLink').value;
    await fetch(`${API_URL}/api/admin/banner`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ text, link })
    });
    alert('Баннер сохранён! Он появится у всех пользователей.');
}

async function loadStats() {
    const res = await fetch(`${API_URL}/api/stats`);
    const s = await res.json();
    document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-value">${s.users||0}</div><div>👥</div></div>
        <div class="stat"><div class="stat-value">${s.pendingReports||0}</div><div>🚨 Жалоб</div></div>
        <div class="stat"><div class="stat-value">${s.spamBlockedUsers||0}</div><div>🚫 Спам-блок</div></div>
        <div class="stat"><div class="stat-value">${s.frozenUsers||0}</div><div>❄️ Заморозка</div></div>
    `;
}

async function loadUsers() {
    const res = await fetch(`${API_URL}/api/users`);
    allUsers = await res.json();
    renderUsers(allUsers);
}

function filterUsers() {
    const search = document.getElementById('searchUsers').value.toLowerCase();
    const filtered = allUsers.filter(u => u.name.toLowerCase().includes(search) || u.username.toLowerCase().includes(search));
    renderUsers(filtered);
}

function renderUsers(users) {
    document.getElementById('usersList').innerHTML = `
        <table><thead><tr><th>Пользователь</th><th>⭐</th><th>Метки</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody>${users.map(u => `
            <tr>
                <td><b>${escapeHtml(u.name)}</b><br>@${escapeHtml(u.username)}</td>
                <td>⭐ ${u.stars}</td>
                <td>${['verified','scam','fake','bot'].map(t => `<span class="tag tag-${t} ${(u.tags||[]).includes(t)?'selected':''}" onclick="toggleTag('${u.id}','${t}')">${t}</span>`).join('')}</td>
                <td>${u.banned?'⛔ Бан':u.frozen?'❄️ Заморозка':u.spamBlocked?'🚫 Спам':'✅'}</td>
                <td>
                    <button onclick="addStars('${u.id}')">⭐+</button>
                    <button onclick="toggleAction('${u.id}','banned',${!u.banned})">${u.banned?'Разбан':'Бан'}</button>
                    <button onclick="toggleAction('${u.id}','frozen',${!u.frozen})">${u.frozen?'Разморозить':'Заморозить'}</button>
                    <button onclick="spamBlock('${u.id}')">🚫 Спам</button>
                </td>
            </tr>
        `).join('')}</tbody></table>
    `;
}

async function toggleTag(id, tag) {
    const u = allUsers.find(u => u.id === id);
    let tags = u.tags || [];
    if(tags.includes(tag)) tags = tags.filter(t => t !== tag);
    else tags.push(tag);
    await fetch(`${API_URL}/api/users/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ tags }) });
    loadUsers();
}

async function addStars(id) { let amt=prompt('Сколько?',100); if(amt){ let u=allUsers.find(u=>u.id===id); await fetch(`${API_URL}/api/users/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ stars: (u.stars||0)+parseInt(amt) }) }); loadUsers(); loadStats(); } }
async function toggleAction(id, field, val) { await fetch(`${API_URL}/api/users/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ [field]: val }) }); loadUsers(); loadStats(); }
async function spamBlock(id) { let hours=prompt('На сколько часов? (0=навсегда)','24'); if(hours!==null){ let reason=prompt('Причина:'); let until=parseInt(hours)>0?Date.now()+parseInt(hours)*3600000:null; await fetch(`${API_URL}/api/users/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ spamBlocked: true, spamReason: reason, spamUntil: until }) }); loadUsers(); loadStats(); } }

async function loadReports() {
    const res = await fetch(`${API_URL}/api/reports`);
    const reports = await res.json();
    document.getElementById('reportsList').innerHTML = reports.filter(r=>r.status==='pending').map(r => `
        <div style="border-bottom:1px solid #1e2d45;padding:12px">
            <b>${r.reason}</b> от @${r.fromUserId} на ${r.type==='chat'?'канал':'@'+r.againstId}<br>${r.comment||''}<br>
            ${r.type==='chat'?`<button onclick="resolveReport('${r.id}','delete')">🗑️ Удалить канал</button>`:`<button onclick="resolveReport('${r.id}','ban')">🚫 Бан</button><button onclick="resolveReport('${r.id}','freeze')">❄️ Заморозить</button><button onclick="resolveReportWithSpam('${r.id}')">🚫 Спам</button>`}
            <button onclick="resolveReport('${r.id}','reject')">✗ Отказать</button>
        </div>
    `).join('') || 'Нет жалоб';
}
async function resolveReport(id, action) { await fetch(`${API_URL}/api/reports/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status:'resolved', action }) }); loadReports(); loadStats(); loadChats(); loadUsers(); }
async function resolveReportWithSpam(id) { let hours=prompt('Спам-блок на часов?','24'); if(hours!==null) await fetch(`${API_URL}/api/reports/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status:'resolved', action:'spam', duration:parseInt(hours) }) }); loadReports(); loadStats(); loadUsers(); }

async function loadAppeals() {
    const res = await fetch(`${API_URL}/api/bot/appeals`);
    const appeals = await res.json();
    document.getElementById('appealsList').innerHTML = appeals.map(a => `
        <div style="border-bottom:1px solid #1e2d45;padding:12px">
            <b>📝 Апелляция</b> от @${a.userId}<br>
            Причина: ${a.reason}<br>
            <button onclick="resolveAppeal('${a.id}','approved')">✅ Одобрить (снять блок)</button>
            <button onclick="resolveAppealWithComment('${a.id}','rejected')">❌ Отказать</button>
        </div>
    `).join('') || 'Нет апелляций';
}
async function resolveAppeal(id, status) { await fetch(`${API_URL}/api/bot/appeals/${id}`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status }) }); loadAppeals(); loadUsers(); }
function resolveAppealWithComment(id,status) { let comment=prompt('Причина отказа:'); if(comment) fetch(`${API_URL}/api/bot/appeals/${id}`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status, adminComment:comment }) }).then(()=>{ loadAppeals(); loadUsers(); }); }

async function loadChats() {
    const res = await fetch(`${API_URL}/api/chats`);
    const chats = await res.json();
    document.getElementById('chatsList').innerHTML = chats.map(c => `
        <div style="border-bottom:1px solid #1e2d45;padding:12px;display:flex;justify-content:space-between;flex-wrap:wrap">
            <div><b>${c.type==='channel'?'📢':'👥'} ${escapeHtml(c.title)}</b><br>${c.description||''}<br>${c.isPublic?'🔓 Публичный':'🔒 Приватный'}</div>
            <div>
                <button onclick="toggleChatPrivacy('${c.id}',${c.isPublic?0:1})">${c.isPublic?'🔒 Приватный':'🔓 Публичный'}</button>
                <button onclick="deleteChat('${c.id}')" class="btn-danger">🗑️</button>
            </div>
        </div>
    `).join('') || 'Нет каналов';
}
async function toggleChatPrivacy(id, isPublic) { await fetch(`${API_URL}/api/chats/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ isPublic }) }); loadChats(); }
async function deleteChat(id) { if(confirm('Удалить?')){ await fetch(`${API_URL}/api/chats/${id}`,{ method:'DELETE' }); loadChats(); } }

async function loadUserSelect() {
    const res = await fetch(`${API_URL}/api/users`);
    const users = await res.json();
    document.getElementById('notifyUser').innerHTML = '<option value="">Выберите пользователя</option>' + users.map(u => `<option value="${u.id}">${escapeHtml(u.name)} (@${u.username})</option>`).join('');
}

async function sendBotNotification() {
    const userId = document.getElementById('notifyUser').value;
    const title = document.getElementById('notifyTitle').value;
    const message = document.getElementById('notifyMessage').value;
    if(!userId || !title || !message) { alert('Заполните все поля'); return; }
    await fetch(`${API_URL}/api/admin/send-notification`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ userId, title, message })
    });
    alert('Уведомление отправлено от лица @TelegramNotifications');
    document.getElementById('notifyTitle').value = '';
    document.getElementById('notifyMessage').value = '';
}

function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
</script>
</body>
</html>
