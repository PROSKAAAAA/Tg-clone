<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#0a0e17;color:#fff;padding:20px}
        .card{background:#0f1520;border-radius:12px;padding:20px;margin-bottom:20px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #1e2d45}
        button{background:#00d4ff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600}
        .btn-danger{background:#ff4757;color:#fff}
        .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:20px}
        .stat{background:#0f1520;padding:20px;border-radius:12px}
        input,select{background:#0a0e17;border:1px solid #1e2d45;padding:8px;border-radius:8px;color:#fff;width:100%}
    </style>
</head>
<body>
<div id="loginDiv" class="card" style="max-width:400px;margin:100px auto">
    <h2>🛡️ Admin Login</h2>
    <input id="adminPass" type="password" placeholder="Пароль" style="margin:10px 0">
    <button onclick="adminLogin()">Войти</button>
    <div id="loginError" style="color:#ff4757;margin-top:10px"></div>
</div>
<div id="adminPanel" style="display:none">
    <div class="stats" id="stats"></div>
    <div class="card"><h3>👥 Пользователи</h3><div id="usersList"></div></div>
    <div class="card"><h3>🚨 Жалобы</h3><div id="reportsList"></div></div>
</div>
<script>
    const API_URL = '';
    async function adminLogin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === 'admin2024') {
            document.getElementById('loginDiv').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadStats(); loadUsers(); loadReports();
        } else { document.getElementById('loginError').innerText = 'Неверный пароль'; }
    }
    async function loadStats() {
        const res = await fetch(`${API_URL}/api/stats`);
        const stats = await res.json();
        document.getElementById('stats').innerHTML = `
            <div class="stat">👥 Пользователей: ${stats.users}</div>
            <div class="stat">💬 Сообщений: ${stats.messages}</div>
            <div class="stat">🚨 Жалоб: ${stats.reports}</div>
            <div class="stat">⏳ Ожидают: ${stats.pendingReports}</div>
        `;
    }
    async function loadUsers() {
        const res = await fetch(`${API_URL}/api/users`);
        const users = await res.json();
        document.getElementById('usersList').innerHTML = `
            <table><th>Пользователь</th><th>⭐</th><th>Статус</th><th>Действия</th>
            ${users.map(u => `<tr><td><strong>${u.name}</strong><br>@${u.username}</td><td>${u.stars||0}</td><td>${u.banned?'⛔ Бан':'✅ Активен'}</td><td><button onclick="toggleBan('${u.id}',${!u.banned})">${u.banned?'Разбан':'Бан'}</button> <button onclick="giveStars('${u.id}')">⭐+</button></td>`).join('')}
        `;
    }
    async function loadReports() {
        const res = await fetch(`${API_URL}/api/reports`);
        const reports = await res.json();
        document.getElementById('reportsList').innerHTML = reports.filter(r=>r.status==='pending').map(r=>`
            <div style="border-bottom:1px solid #1e2d45;padding:12px"><strong>${r.reason}</strong> от @${r.fromUserId} на @${r.againstUserId}<br>${r.comment||''}<br><button onclick="resolve('${r.id}','ban')">🚫 Бан</button> <button onclick="resolve('${r.id}','mute')">🔇 Мьют</button> <button onclick="resolve('${r.id}','reject')">❌ Отказ</button></div>
        `).join('') || '<p>Нет жалоб</p>';
    }
    async function toggleBan(id, ban) { await fetch(`${API_URL}/api/users/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({banned:ban})}); loadUsers(); }
    async function giveStars(id) { let amt=prompt('Сколько звёзд?',100); if(amt){ let u=await fetch(`${API_URL}/api/users/${id}`).then(r=>r.json()); await fetch(`${API_URL}/api/users/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({stars:(u.stars||0)+parseInt(amt)})}); loadUsers(); } }
    async function resolve(id,action){ let status=action==='reject'?'rejected':'resolved'; await fetch(`${API_URL}/api/reports/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status,action:action==='reject'?'':action})}); loadReports(); loadStats(); }
    window.toggleBan=toggleBan; window.giveStars=giveStars; window.resolve=resolve;
</script>
</body>
</html>
