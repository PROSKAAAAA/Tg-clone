<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#0a0e17;color:#fff;padding:20px}
        .card{background:#0f1520;border-radius:12px;padding:20px;margin-bottom:20px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #1e2d45}
        button{background:#00d4ff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;margin:2px}
        .btn-danger{background:#ff4757;color:#fff}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:20px}
        .stat{background:#0f1520;padding:16px;border-radius:12px}
        .stat-value{font-size:28px;font-weight:700;color:#00d4ff}
        input,select{background:#0a0e17;border:1px solid #1e2d45;padding:8px;border-radius:8px;color:#fff}
        .login-box{max-width:400px;margin:100px auto}
        .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;margin-right:4px;cursor:pointer}
        .tag-verified{background:#00d4ff20;color:#00d4ff}
        .tag-scam{background:#ff475720;color:#ff4757}
        .tag-fake{background:#f5a62320;color:#f5a623}
        .tag-bot{background:#a55eea20;color:#a55eea}
        .tag.selected{background:#2b88d8;color:#fff}
    </style>
</head>
<body>
<div id="loginBox" class="card login-box">
    <h2>Admin</h2>
    <input type="password" id="adminPass" style="margin:12px 0">
    <button onclick="adminLogin()">Войти</button>
    <div id="loginError" style="color:#ff4757"></div>
</div>
<div id="adminPanel" style="display:none">
    <div class="stats" id="stats"></div>
    <div class="card"><h3>👥 Пользователи</h3><div id="usersList"></div></div>
    <div class="card"><h3>🚨 Жалобы</h3><div id="reportsList"></div></div>
    <div class="card"><h3>📝 Апелляции</h3><div id="appealsList"></div></div>
    <div class="card"><h3>📢 Каналы/Группы</h3><div id="chatsList"></div></div>
</div>
<script>
const API_URL = '';
async function adminLogin() {
    if(document.getElementById('adminPass').value === 'admin2024') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadStats(); loadUsers(); loadReports(); loadAppeals(); loadChats();
    } else { document.getElementById('loginError').innerText = 'Неверный пароль'; }
}
async function loadStats() {
    const res = await fetch(`${API_URL}/api/stats`);
    const s = await res.json();
    document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-value">${s.users||0}</div><div>👥</div></div>
        <div class="stat"><div class="stat-value">${s.pendingReports||0}</div><div>🚨 Жалоб</div></div>
        <div class="stat"><div class="stat-value">${s.pendingAppeals||0}</div><div>📝 Апелляций</div></div>
        <div class="stat"><div class="stat-value">${s.spamBlockedUsers||0}</div><div>🚫 Спам-блок</div></div>
        <div class="stat"><div class="stat-value">${s.frozenUsers||0}</div><div>❄️ Заморозка</div></div>
    `;
}
async function loadUsers() {
    const res = await fetch(`${API_URL}/api/users`);
    const users = await res.json();
    document.getElementById('usersList').innerHTML = `
        <table><thead><th>Пользователь</th><th>⭐</th><th>Метки</th><th>Статус</th><th>Действия</th></thead>
        <tbody>${users.map(u => `
            <tr><td><b>${u.name}</b><br>@${u.username}</td>
            <td>⭐ ${u.stars}</td>
            <td>${['verified','scam','fake','bot'].map(t => `<span class="tag tag-${t} ${(u.tags||[]).includes(t)?'selected':''}" onclick="toggleTag('${u.id}','${t}')">${t}</span>`).join('')}</td>
            <td>${u.banned?'⛔ Бан':u.frozen?'❄️ Заморозка':u.spamBlocked?'🚫 Спам':'✅'}</td>
            <td><button onclick="addStars('${u.id}')">⭐+</button>
            <button onclick="toggleAction('${u.id}','banned',${!u.banned})">${u.banned?'Разбан':'Бан'}</button>
            <button onclick="toggleAction('${u.id}','frozen',${!u.frozen})">${u.frozen?'Разморозить':'Заморозить'}</button>
            <button onclick="spamBlock('${u.id}')">🚫 Спам</button></td></tr>
        `).join('')}</tbody>
    `;
}
async function toggleTag(id, tag) {
    const res = await fetch(`${API_URL}/api/users/${id}`);
    const u = await res.json();
    let tags = u.tags || [];
    if(tags.includes(tag)) tags = tags.filter(t => t !== tag);
    else tags.push(tag);
    await fetch(`${API_URL}/api/users/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ tags }) });
    loadUsers();
}
async function addStars(id) { let amt=prompt('Сколько?',100); if(amt){ let u=await fetch(`${API_URL}/api/users/${id}`).then(r=>r.json()); await fetch(`${API_URL}/api/users/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ stars: (u.stars||0)+parseInt(amt) }) }); loadUsers(); } }
async function toggleAction(id, field, val) { await fetch(`${API_URL}/api/users/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ [field]: val }) }); loadUsers(); loadStats(); }
async function spamBlock(id) { let hours=prompt('На сколько часов? (0=навсегда)','24'); if(hours!==null){ let reason=prompt('Причина:'); let until=parseInt(hours)>0?Date.now()+parseInt(hours)*3600000:null; await fetch(`${API_URL}/api/users/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ spamBlocked: true, spamReason: reason, spamUntil: until }) }); loadUsers(); loadStats(); } }
async function loadReports() {
    const res = await fetch(`${API_URL}/api/reports`);
    const reports = await res.json();
    document.getElementById('reportsList').innerHTML = reports.filter(r=>r.status==='pending').map(r => `
        <div style="border-bottom:1px solid #1e2d45;padding:12px"><b>${r.reason}</b> от @${r.fromUserId} на ${r.type==='chat'?'канал':'@'+r.againstId}<br>${r.comment||''}<br>
        ${r.type==='chat'?`<button onclick="resolveReport('${r.id}','delete')">🗑️ Удалить канал</button>`:`<button onclick="resolveReport('${r.id}','ban')">🚫 Бан</button><button onclick="resolveReport('${r.id}','freeze')">❄️ Заморозить</button><button onclick="resolveReportWithSpam('${r.id}')">🚫 Спам</button>`}
        <button onclick="resolveReport('${r.id}','reject')">✗ Отказать</button></div>
    `).join('') || 'Нет жалоб';
}
async function resolveReport(id, action) { await fetch(`${API_URL}/api/reports/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status:'resolved', action }) }); loadReports(); loadStats(); loadChats(); }
async function resolveReportWithSpam(id) { let hours=prompt('Спам-блок на часов?','24'); if(hours!==null) await fetch(`${API_URL}/api/reports/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status:'resolved', action:'spam', duration:parseInt(hours) }) }); loadReports(); loadStats(); loadUsers(); }
async function loadAppeals() {
    const res = await fetch(`${API_URL}/api/appeals`);
    const appeals = await res.json();
    document.getElementById('appealsList').innerHTML = appeals.filter(a=>a.status==='pending').map(a => `
        <div style="border-bottom:1px solid #1e2d45;padding:12px"><b>📝 Апелляция</b> от @${a.userId}<br>${a.reason||''}<br>
        <button onclick="resolveAppeal('${a.id}','approved')">✅ Одобрить</button>
        <button onclick="resolveAppealWithComment('${a.id}','rejected')">❌ Отказать</button></div>
    `).join('') || 'Нет апелляций';
}
async function resolveAppeal(id, status) { let comment=status==='rejected'?prompt('Причина отказа:'):''; await fetch(`${API_URL}/api/appeals/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status, adminComment:comment }) }); loadAppeals(); loadStats(); loadUsers(); }
function resolveAppealWithComment(id,status) { let comment=prompt('Причина отказа:'); if(comment) fetch(`${API_URL}/api/appeals/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status, adminComment:comment }) }).then(()=>{ loadAppeals(); loadStats(); loadUsers(); }); }
async function loadChats() {
    const res = await fetch(`${API_URL}/api/chats`);
    const chats = await res.json();
    document.getElementById('chatsList').innerHTML = chats.map(c => `
        <div style="border-bottom:1px solid #1e2d45;padding:12px;display:flex;justify-content:space-between">
            <div><b>${c.type==='channel'?'📢':'👥'} ${c.title}</b><br>${c.description||''}<br>${c.isPublic?'🔓 Публичный':'🔒 Приватный'}</div>
            <div><button onclick="toggleChatPrivacy('${c.id}',${c.isPublic?0:1})">${c.isPublic?'🔒 Сделать приватным':'🔓 Сделать публичным'}</button>
            <button onclick="deleteChat('${c.id}')" class="btn-danger">🗑️ Удалить</button></div>
        </div>
    `).join('');
}
async function toggleChatPrivacy(id, isPublic) { await fetch(`${API_URL}/api/chats/${id}`,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ isPublic }) }); loadChats(); }
async function deleteChat(id) { if(confirm('Удалить?')){ await fetch(`${API_URL}/api/chats/${id}`,{ method:'DELETE' }); loadChats(); } }
</script>
</body>
</html>
