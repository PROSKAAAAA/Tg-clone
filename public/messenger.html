<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#0e1621;color:#fff;height:100vh}
        
        .auth{position:fixed;inset:0;background:#0e1621;display:flex;align-items:center;justify-content:center;z-index:100}
        .auth-box{background:#17212b;border-radius:28px;padding:40px;width:400px}
        .auth-box h2{text-align:center;margin-bottom:24px}
        .auth-tabs{display:flex;gap:10px;margin-bottom:20px}
        .auth-tabs button{flex:1;background:#232e3c;padding:12px;border-radius:12px;border:none;color:#fff}
        .auth-tabs button.active{background:#2b88d8}
        input{width:100%;padding:12px;margin-bottom:12px;border-radius:12px;border:none;background:#0e1621;color:#fff}
        button{background:#2b88d8;border:none;padding:12px;border-radius:12px;color:#fff;cursor:pointer}
        
        .app{display:flex;height:100vh}
        .sidebar{width:320px;background:#17212b;border-right:1px solid #293d4f;display:flex;flex-direction:column}
        .main{flex:1;display:flex;flex-direction:column}
        
        .header{padding:12px 16px;border-bottom:1px solid #293d4f;display:flex;align-items:center;gap:12px}
        .avatar{width:48px;height:48px;border-radius:50%;background:#2b88d8;display:flex;align-items:center;justify-content:center;font-size:20px}
        .avatar-small{width:44px;height:44px;border-radius:50%;background:#2b88d8;display:flex;align-items:center;justify-content:center;font-size:18px}
        .bot-avatar{background:#a55eea}
        .verified-badge{position:relative}
        .verified-badge::after{content:"✅";position:absolute;bottom:-2px;right:-2px;font-size:12px;background:#0e1621;border-radius:50%}
        
        .search{padding:8px 16px}
        .search input{width:100%;background:#232e3c;border:none;border-radius:22px;padding:10px 16px}
        
        .chat-list{flex:1;overflow-y:auto}
        .chat-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer}
        .chat-item:hover{background:#232e3c}
        .chat-name{font-size:15px;font-weight:500}
        
        .messages{flex:1;overflow-y:auto;padding:16px}
        .message{display:flex;margin-bottom:12px;max-width:70%}
        .message.out{justify-content:flex-end;align-self:flex-end}
        .message.in{align-self:flex-start}
        .bubble{background:#2b5278;border-radius:16px;padding:8px 14px}
        .message.in .bubble{background:#182533}
        
        .input-area{padding:12px 16px;border-top:1px solid #293d4f}
        .input-row{display:flex;gap:10px}
        .msg-input{flex:1;background:#232e3c;border:none;border-radius:22px;padding:10px 16px;color:#fff;resize:none}
        
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200}
        .modal.active{display:flex}
        .modal-content{background:#17212b;border-radius:20px;width:500px;max-width:90vw;padding:20px;max-height:80vh;overflow-y:auto}
        .modal-header{display:flex;justify-content:space-between;margin-bottom:16px}
        
        .drawer{position:fixed;left:-300px;top:0;width:280px;height:100%;background:#17212b;z-index:151;transition:left 0.3s;padding:20px}
        .drawer.open{left:0}
        .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;display:none}
        .drawer-item{padding:12px 0;cursor:pointer;border-bottom:1px solid #293d4f;display:flex;align-items:center;gap:10px}
        
        .spam-panel{position:fixed;bottom:0;left:0;right:0;background:#17212b;padding:20px;border-radius:20px 20px 0 0;z-index:300;transform:translateY(100%);transition:transform 0.3s}
        .spam-panel.open{transform:translateY(0)}
        
        .notification{background:#2b5278;border-radius:12px;padding:12px;margin-bottom:8px}
        .notification.unread{background:#2b88d8}
        
        .error{color:#e05c65;margin-top:12px;text-align:center}
        .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;margin-right:4px;background:#2b88d820;color:#2b88d8}
        .badge-verified{background:#2b88d820;color:#2b88d8}
        
        .bot-message{background:#232e3c;border-radius:12px;padding:12px;margin-bottom:8px}
        .bot-response{background:#0e1621;padding:10px;border-radius:10px;margin-top:6px;white-space:pre-wrap}
    </style>
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="authScreen" class="auth">
    <div class="auth-box">
        <h2>📱 Telegram</h2>
        <div class="auth-tabs">
            <button id="loginBtn" class="active">Вход</button>
            <button id="regBtn">Регистрация</button>
        </div>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="doLogin()">Войти</button>
        </div>
        <div id="registerForm" style="display:none">
            <input type="text" id="regName" placeholder="Ваше имя">
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="doRegister()">Зарегистрироваться</button>
        </div>
        <div id="authError" class="error"></div>
    </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="app" class="app" style="display:none">
    <div class="sidebar">
        <div class="header">
            <div class="avatar-small verified-badge" id="myAvatar" onclick="openDrawer()">👤</div>
            <div style="flex:1">
                <div id="myName"></div>
                <div id="myStars" style="font-size:12px;color:#f5a623"></div>
            </div>
            <button onclick="openNewChat()" style="width:40px;height:40px;border-radius:50%;background:#232e3c">✏️</button>
        </div>
        <div class="search">
            <input type="text" id="searchInput" placeholder="Поиск..." oninput="renderChatList()">
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>
    
    <div class="main">
        <div class="header" id="chatHeader" style="display:none">
            <div class="avatar-small" id="chatAvatar"></div>
            <div style="flex:1;cursor:pointer" onclick="openProfile(currentChatId)">
                <div id="chatName"></div>
                <div id="chatTags" style="font-size:11px"></div>
            </div>
            <button onclick="openReport()" style="width:40px;height:40px;border-radius:50%;background:#232e3c">🚨</button>
        </div>
        <div id="emptyState" style="flex:1;display:flex;align-items:center;justify-content:center;color:#aaa">Выберите чат</div>
        <div id="chatView" style="display:none;flex-direction:column;flex:1">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div class="input-row">
                    <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ДРАВЕР -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
    <div style="text-align:center;margin-bottom:20px">
        <div class="avatar-small verified-badge" style="width:80px;height:80px;margin:0 auto 12px;font-size:32px" id="drawerAvatar">👤</div>
        <div id="drawerName"></div>
        <div id="drawerStars" style="color:#f5a623"></div>
    </div>
    <div class="drawer-item" onclick="closeDrawer(); openProfile(currentUser.id)"><span>👤</span> Мой профиль</div>
    <div class="drawer-item" onclick="closeDrawer(); openTelegramNotifications()"><span>📢</span> @TelegramNotifications <span style="color:#4dba87;font-size:11px;margin-left:auto">✅</span></div>
    <div class="drawer-item" onclick="closeDrawer(); openSpamInfoBot()"><span>🤖</span> @SpamInfoBot <span style="color:#4dba87;font-size:11px;margin-left:auto">✅</span></div>
    <div class="drawer-item" onclick="closeDrawer(); openShop()"><span>🏪</span> Магазин</div>
    <div class="drawer-item" onclick="closeDrawer(); openMyNFTs()"><span>🎁</span> Мои NFT</div>
    <div class="drawer-item" onclick="logout()"><span>🚪</span> Выйти</div>
</div>

<!-- МОДАЛ ПРОФИЛЯ -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3 id="profileTitle"></h3><button onclick="closeModal('profileModal')">✕</button></div>
        <div id="profileBody"></div>
    </div>
</div>

<!-- МОДАЛ УВЕДОМЛЕНИЙ (TelegramNotifications) -->
<div id="notificationsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📢 @TelegramNotifications <span style="color:#4dba87;font-size:12px">✅ Официальный бот</span></h3>
            <button onclick="closeModal('notificationsModal')">✕</button>
        </div>
        <div id="notificationsList" style="max-height:400px;overflow-y:auto"></div>
    </div>
</div>

<!-- МОДАЛ СПАМ ИНФО БОТА -->
<div id="spamBotModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>🤖 @SpamInfoBot <span style="color:#4dba87;font-size:12px">✅ Официальный бот</span></h3>
            <button onclick="closeModal('spamBotModal')">✕</button>
        </div>
        <div style="margin-bottom:12px">
            <input type="text" id="botCommand" placeholder="Введите команду: /start, /appeal [причина]" style="width:70%;display:inline-block;margin-right:8px">
            <button onclick="sendBotCommand()" style="width:25%">➤</button>
        </div>
        <div id="botMessages" style="max-height:300px;overflow-y:auto;margin-bottom:12px"></div>
        <div id="botStatus" style="background:#0e1621;border-radius:12px;padding:12px"></div>
    </div>
</div>

<!-- МОДАЛ НОВОГО ЧАТА -->
<div id="newChatModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>Новый чат</h3><button onclick="closeModal('newChatModal')">✕</button></div>
        <div style="display:flex;gap:8px;margin-bottom:16px">
            <button onclick="showSection('user')" style="flex:1">👤 Пользователь</button>
            <button onclick="showSection('channel')" style="flex:1">📢 Канал</button>
            <button onclick="showSection('group')" style="flex:1">👥 Группа</button>
        </div>
        <div id="newChatSection"></div>
    </div>
</div>

<!-- МОДАЛ ЖАЛОБЫ -->
<div id="reportModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>🚨 Жалоба</h3><button onclick="closeModal('reportModal')">✕</button></div>
        <select id="reportReason" style="width:100%;margin-bottom:12px;padding:10px;background:#0e1621;border:1px solid #293d4f;border-radius:12px;color:#fff">
            <option value="spam">Спам</option>
            <option value="violence">Насилие</option>
            <option value="fake">Фейк</option>
            <option value="scam">Мошенничество</option>
        </select>
        <textarea id="reportComment" placeholder="Комментарий" rows="3" style="width:100%;margin-bottom:12px;padding:10px;background:#0e1621;border:1px solid #293d4f;border-radius:12px;color:#fff"></textarea>
        <button onclick="submitReport()">Отправить</button>
    </div>
</div>

<!-- СПАМ-БЛОК ПАНЕЛЬ -->
<div id="spamPanel" class="spam-panel">
    <h3>🚫 Спам-блок</h3>
    <p id="spamReasonText"></p>
    <button onclick="closeSpamPanel(); openSpamInfoBot()">🤖 Обратиться к @SpamInfoBot</button>
    <button onclick="closeSpamPanel()" style="margin-top:8px;background:#555">Закрыть</button>
</div>

<script>
const API_URL = '';
let currentUser = null;
let currentChatId = null;
let allUsers = [];
let dialogs = [];
let myChats = [];

// ============ АВТОРИЗАЦИЯ ============
document.getElementById('loginBtn').onclick = () => {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginBtn').classList.add('active');
    document.getElementById('regBtn').classList.remove('active');
};
document.getElementById('regBtn').onclick = () => {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('regBtn').classList.add('active');
    document.getElementById('loginBtn').classList.remove('active');
};

async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if(!username || !password) { showError('Заполните поля'); return; }
    try {
        const res = await fetch(`${API_URL}/api/login`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ username, password })
        });
        const data = await res.json();
        if(data.success) {
            currentUser = data.user;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            updateUI();
            await loadData();
            startPolling();
            checkSpamStatus();
            loadNotifications();
        } else { showError(data.error); }
    } catch(e) { showError('Ошибка сервера'); }
}

async function doRegister() {
    const name = document.getElementById('regName').value.trim();
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    if(!name || !username || !password) { showError('Заполните поля'); return; }
    try {
        const res = await fetch(`${API_URL}/api/register`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ name, username, password })
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('loginBtn').click();
            document.getElementById('loginUsername').value = username;
            showError('Регистрация успешна! Войдите.', 'success');
        } else { showError(data.error); }
    } catch(e) { showError('Ошибка сервера'); }
}

function showError(msg, type='error') {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.color = type === 'success' ? '#4dba87' : '#e05c65';
    setTimeout(() => el.textContent = '', 3000);
}

function updateUI() {
    document.getElementById('myName').innerHTML = currentUser.name;
    document.getElementById('myStars').innerHTML = `⭐ ${currentUser.stars}`;
    document.getElementById('drawerName').innerHTML = currentUser.name;
    document.getElementById('drawerStars').innerHTML = `⭐ ${currentUser.stars}`;
    document.getElementById('myAvatar').innerHTML = currentUser.name[0];
    document.getElementById('drawerAvatar').innerHTML = currentUser.name[0];
}

// ============ УВЕДОМЛЕНИЯ ============
async function loadNotifications() {
    try {
        const res = await fetch(`${API_URL}/api/notifications/${currentUser.id}`);
        const notifs = await res.json();
        const unreadCount = notifs.filter(n => !n.read).length;
        if(unreadCount > 0) {
            document.getElementById('myAvatar').classList.add('verified-badge');
        }
        // Не показываем автоматически, только по клику
    } catch(e) {}
}

async function openTelegramNotifications() {
    const res = await fetch(`${API_URL}/api/notifications/${currentUser.id}`);
    const notifs = await res.json();
    const container = document.getElementById('notificationsList');
    if(notifs.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#aaa;padding:40px">Нет уведомлений</div>';
    } else {
        container.innerHTML = notifs.map(n => `
            <div class="notification ${!n.read ? 'unread' : ''}">
                <strong>${n.title}</strong><br>
                ${n.message}<br>
                <span style="font-size:11px;color:#aaa">${new Date(n.ts).toLocaleString()}</span>
            </div>
        `).join('');
    }
    // Помечаем как прочитанные
    await fetch(`${API_URL}/api/notifications/mark-read`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ userId: currentUser.id })
    });
    openModal('notificationsModal');
}

// ============ БОТ SPAM INFO ============
async function openSpamInfoBot() {
    const container = document.getElementById('botMessages');
    container.innerHTML = '<div style="text-align:center;color:#aaa;padding:20px">Загрузка...</div>';
    openModal('spamBotModal');
    
    // Получаем статус
    const res = await fetch(`${API_URL}/api/bot/spam-info`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ userId: currentUser.id, command: '/start' })
    });
    const data = await res.json();
    
    container.innerHTML = `
        <div class="bot-message">
            <strong>🤖 @SpamInfoBot</strong> <span style="color:#4dba87">✅</span>
            <div class="bot-response">${data.response.replace(/\n/g, '<br>')}</div>
        </div>
    `;
    document.getElementById('botStatus').innerHTML = '';
}

async function sendBotCommand() {
    const input = document.getElementById('botCommand');
    const text = input.value.trim();
    if(!text) return;
    
    const container = document.getElementById('botMessages');
    container.innerHTML += `
        <div class="bot-message" style="background:#2b5278">
            <strong>👤 ${currentUser.name}</strong>
            <div class="bot-response">${escapeHtml(text)}</div>
        </div>
    `;
    input.value = '';
    
    let command = text.split(' ')[0];
    let args = text.substring(command.length).trim();
    
    const res = await fetch(`${API_URL}/api/bot/spam-info`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ userId: currentUser.id, command, text: args })
    });
    const data = await res.json();
    
    container.innerHTML += `
        <div class="bot-message">
            <strong>🤖 @SpamInfoBot</strong> <span style="color:#4dba87">✅</span>
            <div class="bot-response">${data.response.replace(/\n/g, '<br>')}</div>
        </div>
    `;
    container.scrollTop = container.scrollHeight;
    
    if(data.appeals && data.appeals.length > 0) {
        document.getElementById('botStatus').innerHTML = `<span style="color:#f5a623">📝 У вас есть активные апелляции: ${data.appeals.length}</span>`;
    }
}

// ============ ЗАГРУЗКА ДАННЫХ ============
async function loadData() {
    const [usersRes, dialogsRes, chatsRes] = await Promise.all([
        fetch(`${API_URL}/api/users`),
        fetch(`${API_URL}/api/dialogs/${currentUser.id}`),
        fetch(`${API_URL}/api/my/chats/${currentUser.id}`)
    ]);
    allUsers = await usersRes.json();
    dialogs = await dialogsRes.json();
    myChats = await chatsRes.json();
    renderChatList();
}

function renderChatList() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let items = [];
    for(const dialog of dialogs) {
        const otherId = dialog.user1 === currentUser.id ? dialog.user2 : dialog.user1;
        const user = allUsers.find(u => u.id === otherId);
        if(user) items.push({ type: 'user', id: user.id, name: user.name });
    }
    for(const chat of myChats) {
        items.push({ type: chat.type, id: chat.id, name: chat.title });
    }
    const filtered = search ? items.filter(i => i.name.toLowerCase().includes(search)) : items;
    const container = document.getElementById('chatList');
    if(filtered.length === 0) { container.innerHTML = '<div style="padding:40px;text-align:center;color:#aaa">Нет чатов</div>'; return; }
    container.innerHTML = filtered.map(i => `
        <div class="chat-item" onclick="openChat('${i.type}', '${i.id}')">
            <div class="avatar-small">${i.type === 'user' ? (i.name[0] || '?') : (i.type === 'channel' ? '📢' : '👥')}</div>
            <div><div class="chat-name">${escapeHtml(i.name)}</div></div>
        </div>
    `).join('');
}

// ============ ОТКРЫТИЕ ЧАТА ============
async function openChat(type, id) {
    if(type === 'user') {
        await fetch(`${API_URL}/api/dialogs`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ user1: currentUser.id, user2: id })
        });
        currentChatId = id;
    } else {
        await fetch(`${API_URL}/api/chats/${id}/join`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ userId: currentUser.id })
        });
        currentChatId = `chat_${id}`;
    }
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('chatView').style.display = 'flex';
    document.getElementById('chatHeader').style.display = 'flex';
    const user = allUsers.find(u => u.id === id);
    document.getElementById('chatName').innerHTML = user ? user.name : 'Чат';
    document.getElementById('chatAvatar').innerHTML = user ? (user.name[0] || '?') : '📢';
    const tagsHtml = (user?.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    document.getElementById('chatTags').innerHTML = tagsHtml;
    await loadMessages();
}

async function loadMessages() {
    if(!currentChatId) return;
    const isUser = !currentChatId.startsWith('chat_');
    let url;
    if(isUser) url = `${API_URL}/api/messages/${currentChatId}?currentUserId=${currentUser.id}`;
    else url = `${API_URL}/api/chats/${currentChatId.replace('chat_', '')}/messages`;
    const res = await fetch(url);
    const msgs = await res.json();
    const container = document.getElementById('messages');
    if(msgs.length === 0) { container.innerHTML = '<div style="text-align:center;color:#aaa;padding:40px">Напишите первое сообщение</div>'; return; }
    container.innerHTML = msgs.map(msg => {
        const isOut = msg.fromUserId === currentUser.id;
        return `
            <div class="message ${isOut ? 'out' : 'in'}">
                <div class="bubble">
                    ${escapeHtml(msg.text)}
                    <div style="font-size:10px;color:#aaa;margin-top:4px">${new Date(msg.ts).toLocaleTimeString()}</div>
                </div>
            </div>
        `;
    }).join('');
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text || !currentChatId) return;
    const isUser = !currentChatId.startsWith('chat_');
    let url, body;
    if(isUser) {
        url = `${API_URL}/api/messages`;
        body = { from: currentUser.id, to: currentChatId, type: 'text', text };
    } else {
        url = `${API_URL}/api/chats/${currentChatId.replace('chat_', '')}/messages`;
        body = { fromUserId: currentUser.id, type: 'text', text };
    }
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if(res.status === 403) {
        const err = await res.json();
        if(err.error === 'spam_blocked') {
            document.getElementById('spamReasonText').innerHTML = `Причина: ${err.reason}<br>${err.until ? `До: ${new Date(err.until).toLocaleString()}` : 'Навсегда'}`;
            document.getElementById('spamPanel').classList.add('open');
            return;
        }
        if(err.error === 'frozen') { alert('❄️ Аккаунт заморожен'); return; }
        if(err.error === 'banned') { alert('⛔ Аккаунт заблокирован'); return; }
    }
    input.value = '';
    await loadMessages();
    await loadData();
}

async function checkSpamStatus() {
    const res = await fetch(`${API_URL}/api/users/${currentUser.id}`);
    const user = await res.json();
    if(user.spamBlocked) {
        document.getElementById('spamReasonText').innerHTML = `Причина: ${user.spamReason}<br>${user.spamUntil ? `До: ${new Date(user.spamUntil).toLocaleString()}` : 'Навсегда'}`;
        document.getElementById('spamPanel').classList.add('open');
    }
}

function closeSpamPanel() { document.getElementById('spamPanel').classList.remove('open'); }

// ============ ПРОФИЛЬ ============
async function openProfile(userId) {
    const res = await fetch(`${API_URL}/api/users/${userId}`);
    const user = await res.json();
    if(!user) return;
    document.getElementById('profileTitle').innerHTML = user.name;
    document.getElementById('profileBody').innerHTML = `
        <div style="text-align:center">
            <div class="avatar-small" style="width:80px;height:80px;font-size:32px;margin:0 auto 12px">${user.name[0]}</div>
            <div><strong>${escapeHtml(user.name)}</strong></div>
            <div>@${escapeHtml(user.username)}</div>
            <div style="color:#f5a623">⭐ ${user.stars}</div>
            <div style="margin-top:8px">${(user.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
            ${user.bio ? `<div style="margin-top:12px;padding:12px;background:#0e1621;border-radius:12px">${escapeHtml(user.bio)}</div>` : ''}
            ${userId === currentUser.id ? '<button onclick="editProfile()" style="margin-top:12px;width:100%">✏️ Редактировать</button>' : '<button onclick="closeModal(\'profileModal\')" style="margin-top:12px;width:100%">Закрыть</button>'}
        </div>
    `;
    openModal('profileModal');
}

function editProfile() {
    const newName = prompt('Новое имя', currentUser.name);
    if(newName) {
        fetch(`${API_URL}/api/users/${currentUser.id}`, {
            method:'PUT', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ name: newName })
        });
        currentUser.name = newName;
        updateUI();
        closeModal('profileModal');
        loadData();
    }
}

// ============ НОВЫЙ ЧАТ ============
function openNewChat() { openModal('newChatModal'); showSection('user'); }
function showSection(type) {
    if(type === 'user') {
        document.getElementById('newChatSection').innerHTML = `
            <input type="text" id="userSearch" placeholder="Имя пользователя..." style="margin-bottom:12px">
            <div id="userResults"></div>
        `;
        document.getElementById('userSearch').addEventListener('input', searchUsers);
    } else {
        document.getElementById('newChatSection').innerHTML = `
            <input id="chatTitle" placeholder="Название">
            <textarea id="chatDesc" placeholder="Описание" style="margin-top:12px"></textarea>
            <button onclick="createChat('${type}')" style="margin-top:12px">Создать ${type === 'channel' ? 'канал' : 'группу'}</button>
        `;
    }
}
async function searchUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    if(q.length < 2) return;
    const users = allUsers.filter(u => u.name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q));
    document.getElementById('userResults').innerHTML = users.map(u => `
        <div style="padding:12px;background:#232e3c;border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="startChat('${u.id}')">
            ${escapeHtml(u.name)} (@${u.username})
        </div>
    `).join('');
}
async function startChat(userId) {
    await fetch(`${API_URL}/api/dialogs`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ user1: currentUser.id, user2: userId })
    });
    closeModal('newChatModal');
    await loadData();
    openChat('user', userId);
}
async function createChat(type) {
    const title = document.getElementById('chatTitle').value;
    if(!title) { alert('Введите название'); return; }
    await fetch(`${API_URL}/api/chats`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ type, title, description: document.getElementById('chatDesc')?.value || '', creatorId: currentUser.id })
    });
    closeModal('newChatModal');
    await loadData();
}

// ============ ЖАЛОБЫ ============
function openReport() {
    if(currentChatId && !currentChatId.startsWith('chat_')) openModal('reportModal');
    else alert('Пожаловаться можно только на пользователя');
}
async function submitReport() {
    await fetch(`${API_URL}/api/reports`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ from: currentUser.id, againstId: currentChatId, type: 'user', reason: document.getElementById('reportReason').value, comment: document.getElementById('reportComment').value })
    });
    alert('Жалоба отправлена');
    closeModal('reportModal');
}

function openMyNFTs() { alert('Ваши NFT - в разработке'); }

// ============ ОБЩИЕ ============
function logout() { currentUser = null; location.reload(); }
function startPolling() { setInterval(() => { if(currentChatId) loadMessages(); loadData(); loadNotifications(); }, 3000); }
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').style.display = 'block'; }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').style.display = 'none'; }
function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
