<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #17212b;
            --bg2: #0e1621;
            --bg3: #232e3c;
            --bg4: #2b5278;
            --accent: #2b88d8;
            --accent2: #5ac8fa;
            --text: #fff;
            --text2: #aaa;
            --text3: #6c7883;
            --green: #4dba87;
            --red: #e05c65;
            --yellow: #f5a623;
            --border: #293d4f;
            --msg-out: #2b5278;
            --msg-in: #182533;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg2);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Auth Screen */
        .auth-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0e1621 0%, #17212b 50%, #1a2a3a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--bg3);
            border-radius: 28px;
            padding: 48px 40px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 44px;
        }

        .auth-logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-tabs {
            display: flex;
            background: var(--bg2);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text2);
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: var(--accent);
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group input {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #1a6db8);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(43, 136, 216, 0.4);
        }

        .auth-error {
            background: rgba(224, 92, 101, 0.15);
            border: 1px solid var(--red);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--red);
            margin-top: 12px;
            display: none;
            text-align: center;
        }

        /* App Layout */
        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            flex: 1;
            cursor: pointer;
        }

        .user-name {
            font-size: 16px;
            font-weight: 600;
        }

        .user-stars {
            font-size: 12px;
            color: var(--yellow);
        }

        .logout-btn {
            background: var(--bg3);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: var(--text2);
            font-size: 18px;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: var(--border);
            color: var(--text);
        }

        /* Search */
        .search-box {
            padding: 8px 16px;
        }

        .search-box input {
            width: 100%;
            background: var(--bg3);
            border: none;
            border-radius: 22px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .search-box input::placeholder {
            color: var(--text3);
        }

        /* Chat List */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-list::-webkit-scrollbar {
            width: 4px;
        }

        .chat-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .chat-item:hover {
            background: var(--bg3);
        }

        .chat-item.active {
            background: var(--bg4);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
            overflow: hidden;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-size: 15px;
            font-weight: 500;
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Chat */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg2);
        }

        .chat-header {
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            min-height: 60px;
            background: var(--bg);
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .chat-header-info {
            flex: 1;
            cursor: pointer;
        }

        .chat-header-name {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header-status {
            font-size: 12px;
            color: var(--green);
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            margin-bottom: 4px;
        }

        .message.out {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.in {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-bubble {
            border-radius: 16px;
            padding: 8px 14px;
            position: relative;
            word-break: break-word;
            line-height: 1.45;
            font-size: 15px;
        }

        .message.out .msg-bubble {
            background: var(--msg-out);
            border-bottom-right-radius: 4px;
        }

        .message.in .msg-bubble {
            background: var(--msg-in);
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .msg-time {
            font-size: 10px;
        }

        /* Input Area */
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg);
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .msg-input {
            flex: 1;
            background: var(--bg3);
            border: none;
            border-radius: 22px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 15px;
            resize: none;
            font-family: inherit;
            outline: none;
            max-height: 100px;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: white;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #1a6db8;
            transform: scale(1.05);
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            color: var(--text2);
        }

        .empty-state .icon {
            font-size: 80px;
            opacity: 0.3;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg3);
            border-radius: 20px;
            width: 400px;
            max-width: 90vw;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 17px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 20px;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: fixed;
                left: -100%;
                transition: left 0.3s ease;
                z-index: 100;
                background: var(--bg);
                height: 100%;
            }

            .sidebar.open {
                left: 0;
            }

            .main {
                width: 100%;
            }

            .chat-header {
                padding: 0 12px;
            }

            .message {
                max-width: 85%;
            }
        }

        /* Mobile Menu Button */
        .mobile-menu-btn {
            display: none;
            background: var(--bg3);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: var(--text);
            font-size: 20px;
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .mobile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            display: none;
        }

        .mobile-overlay.active {
            display: block;
        }
    </style>
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen" class="auth-screen">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="logo">📱</div>
            <h1>Telegram</h1>
        </div>
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">Вход</div>
            <div class="auth-tab" data-tab="register">Регистрация</div>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-group">
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Пароль">
            </div>
            <button class="btn-primary" id="doLoginBtn">Войти</button>
        </div>
        
        <!-- Register Form -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <input type="text" id="regName" placeholder="Ваше имя">
            </div>
            <div class="form-group">
                <input type="text" id="regUsername" placeholder="Имя пользователя">
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="Пароль">
            </div>
            <button class="btn-primary" id="doRegisterBtn">Зарегистрироваться</button>
        </div>
        
        <div id="authError" class="auth-error"></div>
    </div>
</div>

<!-- App -->
<div id="app" class="app" style="display: none;">
    <div class="mobile-overlay" id="mobileOverlay"></div>
    
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="user-info" id="userInfo" onclick="openUserProfile()">
                <div class="user-name" id="sidebarUserName"></div>
                <div class="user-stars" id="sidebarUserStars">⭐ 0</div>
            </div>
            <button class="logout-btn" id="logoutBtn">🚪</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск...">
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>
    
    <!-- Main Chat -->
    <div class="main">
        <div class="chat-header">
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            <div class="chat-header-avatar" id="chatHeaderAvatar">📱</div>
            <div class="chat-header-info" id="chatHeaderInfo" onclick="openCurrentUserProfile()">
                <div class="chat-header-name" id="chatHeaderName">Выберите чат</div>
                <div class="chat-header-status" id="chatHeaderStatus"></div>
            </div>
        </div>
        
        <div id="emptyState" class="empty-state">
            <div class="icon">💬</div>
            <div style="font-size: 18px; font-weight: 500;">Выберите чат</div>
            <div style="font-size: 13px; text-align: center;">Нажмите на пользователя слева,<br>чтобы начать общение</div>
        </div>
        
        <div id="chatView" style="display: none; flex-direction: column; flex: 1; min-width: 0;">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div class="input-row">
                    <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- User Profile Modal -->
<div id="userProfileModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h3>Профиль</h3>
            <button class="modal-close" onclick="closeModal('userProfileModal')">✕</button>
        </div>
        <div class="modal-body" id="userProfileBody"></div>
    </div>
</div>

<script>
    const API_URL = '';
    let currentUser = null;
    let currentChatId = null;
    let usersCache = [];
    let pollInterval = null;

    // ============ AUTH ============
    document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const tabName = tab.dataset.tab;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            if (tabName === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
            document.getElementById('authError').style.display = 'none';
        });
    });

    document.getElementById('doLoginBtn').addEventListener('click', login);
    document.getElementById('doRegisterBtn').addEventListener('click', register);
    
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
    document.getElementById('regPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') register();
    });

    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!username || !password) {
            showAuthError('Заполните все поля');
            return;
        }
        
        try {
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (data.success) {
                currentUser = data.user;
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                updateUserInfo();
                loadUsers();
                startPolling();
            } else {
                showAuthError(data.error);
            }
        } catch (err) {
            showAuthError('Ошибка соединения с сервером');
        }
    }

    async function register() {
        const name = document.getElementById('regName').value.trim();
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        
        if (!name || !username || !password) {
            showAuthError('Заполните все поля');
            return;
        }
        
        if (password.length < 4) {
            showAuthError('Пароль должен быть не менее 4 символов');
            return;
        }
        
        try {
            const res = await fetch(`${API_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, username, password })
            });
            const data = await res.json();
            
            if (data.success) {
                // Переключиться на форму входа
                document.querySelector('.auth-tab[data-tab="login"]').click();
                document.getElementById('loginUsername').value = username;
                showAuthError('Регистрация успешна! Теперь войдите.', 'success');
            } else {
                showAuthError(data.error);
            }
        } catch (err) {
            showAuthError('Ошибка соединения с сервером');
        }
    }

    function showAuthError(msg, type = 'error') {
        const errorDiv = document.getElementById('authError');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        if (type === 'success') {
            errorDiv.style.background = 'rgba(77, 186, 135, 0.15)';
            errorDiv.style.borderColor = 'var(--green)';
            errorDiv.style.color = 'var(--green)';
        } else {
            errorDiv.style.background = 'rgba(224, 92, 101, 0.15)';
            errorDiv.style.borderColor = 'var(--red)';
            errorDiv.style.color = 'var(--red)';
        }
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
    }

    // ============ APP ============
    function updateUserInfo() {
        if (!currentUser) return;
        document.getElementById('sidebarUserName').textContent = currentUser.name || currentUser.username;
        document.getElementById('sidebarUserStars').innerHTML = `⭐ ${currentUser.stars || 0}`;
    }

    async function loadUsers() {
        try {
            const res = await fetch(`${API_URL}/api/users`);
            usersCache = await res.json();
            renderChatList();
        } catch (err) {
            console.error('Ошибка загрузки пользователей:', err);
        }
    }

    function renderChatList() {
        const chats = usersCache.filter(u => u.id !== currentUser?.id);
        const searchQuery = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const filtered = searchQuery ? chats.filter(c => 
            c.name.toLowerCase().includes(searchQuery) || 
            c.username.toLowerCase().includes(searchQuery)
        ) : chats;
        
        const chatList = document.getElementById('chatList');
        
        if (filtered.length === 0) {
            chatList.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--text2);">Нет пользователей</div>`;
            return;
        }
        
        chatList.innerHTML = filtered.map(chat => `
            <div class="chat-item ${currentChatId === chat.id ? 'active' : ''}" onclick="openChat('${chat.id}')">
                <div class="chat-avatar">
                    ${chat.avatar ? `<img src="${chat.avatar}">` : (chat.name[0] || '?').toUpperCase()}
                </div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.name)}</div>
                    <div class="chat-preview">@${escapeHtml(chat.username)}</div>
                </div>
            </div>
        `).join('');
    }

    window.openChat = async function(userId) {
        currentChatId = userId;
        const user = usersCache.find(u => u.id === userId);
        
        document.getElementById('chatHeaderName').innerHTML = user ? escapeHtml(user.name) : 'Чат';
        document.getElementById('chatHeaderAvatar').innerHTML = user?.avatar ? `<img src="${user.avatar}" style="width:100%;border-radius:50%">` : (user?.name[0] || '📱').toUpperCase();
        document.getElementById('chatHeaderStatus').innerHTML = '<span class="status-online">онлайн</span>';
        
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';
        
        renderChatList();
        await loadMessages();
        
        // На мобилках закрываем сайдбар
        if (window.innerWidth <= 768) {
            closeMobileSidebar();
        }
    };

    async function loadMessages() {
        if (!currentChatId || !currentUser) return;
        
        try {
            const res = await fetch(`${API_URL}/api/messages/${currentChatId}?currentUserId=${currentUser.id}`);
            const msgs = await res.json();
            
            const messagesDiv = document.getElementById('messages');
            
            if (msgs.length === 0) {
                messagesDiv.innerHTML = `<div style="text-align: center; color: var(--text2); padding: 40px;">Напишите первое сообщение!</div>`;
                return;
            }
            
            let lastDate = '';
            messagesDiv.innerHTML = msgs.map(msg => {
                const isOut = msg.fromUserId === currentUser.id;
                const msgDate = new Date(msg.ts);
                const today = new Date();
                const dateStr = msgDate.toLocaleDateString('ru');
                let dateHeader = '';
                if (dateStr !== lastDate) {
                    lastDate = dateStr;
                    const isToday = dateStr === today.toLocaleDateString('ru');
                    const displayDate = isToday ? 'Сегодня' : dateStr;
                    dateHeader = `<div style="text-align: center; margin: 8px 0;"><span style="background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 12px; font-size: 12px; color: var(--text2);">${displayDate}</span></div>`;
                }
                
                let content = '';
                if (msg.type === 'text') content = escapeHtml(msg.text);
                else if (msg.type === 'gift') content = `🎁 ${escapeHtml(msg.giftName)}`;
                else content = `📎 ${msg.fileName || msg.type}`;
                
                return dateHeader + `
                    <div class="message ${isOut ? 'out' : 'in'}">
                        <div class="msg-bubble">
                            ${content}
                            <div class="msg-meta">
                                <span class="msg-time">${msgDate.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        } catch (err) {
            console.error('Ошибка загрузки сообщений:', err);
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !currentChatId || !currentUser) return;
        
        try {
            await fetch(`${API_URL}/api/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    from: currentUser.id,
                    to: currentChatId,
                    type: 'text',
                    text: text
                })
            });
            
            input.value = '';
            input.style.height = 'auto';
            await loadMessages();
            await loadUsers(); // Обновить список чатов
        } catch (err) {
            console.error('Ошибка отправки:', err);
        }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('msgInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    document.getElementById('msgInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    document.getElementById('searchInput').addEventListener('input', () => {
        renderChatList();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentUser = null;
        currentChatId = null;
        if (pollInterval) clearInterval(pollInterval);
        location.reload();
    });

    // Mobile menu
    document.getElementById('mobileMenuBtn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('mobileOverlay').classList.add('active');
    });
    
    document.getElementById('mobileOverlay').addEventListener('click', closeMobileSidebar);
    
    function closeMobileSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('mobileOverlay').classList.remove('active');
    }

    // Profile
    window.openUserProfile = async function() {
        if (!currentUser) return;
        const body = document.getElementById('userProfileBody');
        body.innerHTML = `
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 32px;">
                    ${currentUser.avatar ? `<img src="${currentUser.avatar}" style="width:100%;border-radius:50%">` : (currentUser.name?.[0] || '?')}
                </div>
                <div style="font-size: 20px; font-weight: 600;">${escapeHtml(currentUser.name)}</div>
                <div style="color: var(--text2); font-size: 13px;">@${escapeHtml(currentUser.username)}</div>
                <div style="margin-top: 8px; color: var(--yellow);">⭐ ${currentUser.stars || 0} звёзд</div>
            </div>
            ${currentUser.bio ? `<div style="background: var(--bg2); border-radius: 12px; padding: 12px; font-size: 14px;">${escapeHtml(currentUser.bio)}</div>` : ''}
        `;
        openModal('userProfileModal');
    };
    
    window.openCurrentUserProfile = openUserProfile;

    function openModal(id) {
        document.getElementById(id).classList.add('active');
    }
    
    window.closeModal = function(id) {
        document.getElementById(id).classList.remove('active');
    };

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(() => {
            if (currentChatId) loadMessages();
            loadUsers();
        }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
