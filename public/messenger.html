<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Messenger</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#0e1621;color:#fff;height:100vh}
        #authScreen{position:fixed;inset:0;background:#0e1621;display:flex;align-items:center;justify-content:center;z-index:100}
        .auth-box{background:#232e3c;border-radius:20px;padding:40px;width:400px}
        input{width:100%;padding:12px;margin-bottom:12px;border-radius:8px;border:none;background:#0e1621;color:#fff}
        button{background:#2b88d8;border:none;padding:12px;border-radius:8px;color:#fff;font-weight:600;cursor:pointer}
        .app{display:flex;height:100vh}
        .sidebar{width:320px;background:#17212b;border-right:1px solid #293d4f;display:flex;flex-direction:column}
        .main{flex:1;display:flex;flex-direction:column}
        .chat-list{flex:1;overflow-y:auto}
        .chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #293d4f}
        .chat-item:hover{background:#232e3c}
        .avatar{width:48px;height:48px;border-radius:50%;background:#2b88d8;display:flex;align-items:center;justify-content:center;font-size:20px}
        .messages{flex:1;overflow-y:auto;padding:16px}
        .message{margin-bottom:12px;display:flex}
        .message.out{justify-content:flex-end}
        .msg-bubble{background:#2b5278;border-radius:12px;padding:8px 12px;max-width:65%}
        .message.in .msg-bubble{background:#182533}
        .input-area{padding:12px;border-top:1px solid #293d4f}
        .input-row{display:flex;gap:10px}
        .msg-input{flex:1;background:#232e3c;border:none;border-radius:22px;padding:10px 16px;color:#fff;resize:none}
        .header{padding:12px 16px;border-bottom:1px solid #293d4f;background:#17212b}
        .tab-btn{display:flex;gap:4px;padding:8px;background:#0e1621;border-radius:12px;margin:8px}
        .tab{flex:1;text-align:center;padding:8px;border-radius:8px;cursor:pointer}
        .tab.active{background:#2b88d8}
    </style>
</head>
<body>
    <div id="authScreen">
        <div class="auth-box">
            <h2 style="text-align:center;margin-bottom:24px">📱 Telegram</h2>
            <div style="display:flex;gap:10px;margin-bottom:20px">
                <button style="flex:1" onclick="showAuthTab('login')">Вход</button>
                <button style="flex:1;background:#555" onclick="showAuthTab('register')">Регистрация</button>
            </div>
            <div id="loginForm">
                <input id="loginUsername" placeholder="Username">
                <input id="loginPassword" type="password" placeholder="Пароль">
                <button onclick="login()">Войти</button>
            </div>
            <div id="registerForm" style="display:none">
                <input id="regName" placeholder="Имя">
                <input id="regUsername" placeholder="Username">
                <input id="regPassword" type="password" placeholder="Пароль">
                <button onclick="register()">Зарегистрироваться</button>
            </div>
            <div id="authError" style="color:#e05c65;margin-top:12px;text-align:center"></div>
        </div>
    </div>

    <div id="app" class="app" style="display:none">
        <div class="sidebar">
            <div style="padding:16px;border-bottom:1px solid #293d4f">
                <div id="userInfo"></div>
                <button onclick="logout()" style="margin-top:10px;width:100%">🚪 Выйти</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>
        <div class="main">
            <div class="header" id="chatHeader">
                <h3 id="currentChatName">Выберите чат</h3>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div class="input-row">
                    <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';
        let currentUser = null;
        let currentChatId = null;
        let usersCache = [];

        function showAuthTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = data.user;
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('userInfo').innerHTML = `<strong>${currentUser.name}</strong><br><small>⭐ ${currentUser.stars}</small>`;
                loadUsers();
                startPolling();
            } else {
                document.getElementById('authError').textContent = data.error;
            }
        }

        async function register() {
            const name = document.getElementById('regName').value;
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const res = await fetch(`${API_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type':application/json' },
                body: JSON.stringify({ name, username, password })
            });
            const data = await res.json();
            if (data.success) {
                showAuthTab('login');
                document.getElementById('authError').style.color = '#4dba87';
                document.getElementById('authError').textContent = 'Регистрация успешна! Войдите.';
            } else {
                document.getElementById('authError').textContent = data.error;
            }
        }

        async function loadUsers() {
            const res = await fetch(`${API_URL}/api/users`);
            usersCache = await res.json();
            renderChatList();
        }

        function renderChatList() {
            const chats = usersCache.filter(u => u.id !== currentUser.id);
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = chats.map(chat => `
                <div class="chat-item" onclick="openChat('${chat.id}')">
                    <div class="avatar">${chat.avatar ? `<img src="${chat.avatar}">` : (chat.name[0] || '?')}</div>
                    <div>
                        <div><strong>${escapeHtml(chat.name)}</strong></div>
                        <div style="font-size:12px;color:#aaa">@${chat.username}</div>
                    </div>
                </div>
            `).join('');
        }

        async function openChat(userId) {
            currentChatId = userId;
            const user = usersCache.find(u => u.id === userId);
            document.getElementById('currentChatName').innerHTML = user ? escapeHtml(user.name) : 'Чат';
            await loadMessages();
        }

        async function loadMessages() {
            if (!currentChatId) return;
            const res = await fetch(`${API_URL}/api/messages/${currentChatId}?currentUserId=${currentUser.id}`);
            const msgs = await res.json();
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = msgs.map(msg => `
                <div class="message ${msg.fromUserId === currentUser.id ? 'out' : 'in'}">
                    <div class="msg-bubble">
                        ${msg.type === 'text' ? escapeHtml(msg.text) : msg.type === 'gift' ? `🎁 ${escapeHtml(msg.giftName)}` : `📎 ${msg.fileName || msg.type}`}
                        <div style="font-size:10px;color:#aaa;margin-top:4px">${new Date(msg.ts).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            
            await fetch(`${API_URL}/api/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    from: currentUser.id,
                    to: currentChatId,
                    type: 'text',
                    text
                })
            });
            
            input.value = '';
            loadMessages();
        }

        function logout() {
            currentUser = null;
            location.reload();
        }

        function startPolling() {
            setInterval(() => {
                if (currentChatId) loadMessages();
                loadUsers();
            }, 2000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        window.openChat = openChat;
        window.sendMessage = sendMessage;
        window.login = login;
        window.register = register;
        window.logout = logout;
        window.showAuthTab = showAuthTab;
    </script>
</body>
</html>
