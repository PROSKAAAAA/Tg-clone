<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#0e1621;color:#fff;height:100vh}
        .auth-screen{position:fixed;inset:0;background:#0e1621;display:flex;align-items:center;justify-content:center;z-index:100}
        .auth-box{background:#17212b;border-radius:28px;padding:40px;width:400px}
        .auth-tabs{display:flex;gap:10px;margin-bottom:20px}
        .auth-tabs button{flex:1;background:#232e3c;padding:12px;border-radius:12px;border:none;color:#fff;cursor:pointer}
        .auth-tabs button.active{background:#2b88d8}
        input{width:100%;padding:12px;margin-bottom:12px;border-radius:12px;border:none;background:#0e1621;color:#fff}
        button{background:#2b88d8;border:none;padding:12px;border-radius:12px;color:#fff;cursor:pointer;font-weight:600}
        .app{display:flex;height:100vh}
        .sidebar{width:320px;background:#17212b;border-right:1px solid #293d4f;display:flex;flex-direction:column}
        .main{flex:1;display:flex;flex-direction:column}
        .sidebar-header{padding:12px 16px;border-bottom:1px solid #293d4f;display:flex;gap:12px;align-items:center}
        .menu-btn{background:#232e3c;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;color:#fff;font-size:20px}
        .user-info{flex:1;cursor:pointer}
        .search{padding:8px 16px}
        .search input{width:100%;background:#232e3c;border-radius:22px;padding:10px 16px}
        .chat-list{flex:1;overflow-y:auto}
        .chat-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer}
        .chat-item:hover{background:#232e3c}
        .avatar{width:52px;height:52px;border-radius:50%;background:#2b88d8;display:flex;align-items:center;justify-content:center;font-size:20px}
        .frozen-avatar{background:#6c7883;filter:grayscale(1);position:relative}
        .frozen-avatar::after{content:"👻";position:absolute;font-size:20px;bottom:-5px;right:-5px}
        .banned-avatar{background:#4a4a4a;filter:grayscale(1)}
        .banned-avatar::after{content:"🕊️";position:absolute;font-size:16px;bottom:-5px;right:-5px}
        .chat-header{padding:12px 16px;border-bottom:1px solid #293d4f;display:flex;align-items:center;gap:12px}
        .messages{flex:1;overflow-y:auto;padding:16px}
        .message{display:flex;margin-bottom:12px;max-width:70%}
        .message.out{justify-content:flex-end;align-self:flex-end}
        .message.in{align-self:flex-start}
        .msg-bubble{background:#2b5278;border-radius:16px;padding:8px 14px;border-bottom-right-radius:4px}
        .message.in .msg-bubble{background:#182533;border-bottom-left-radius:4px}
        .input-area{padding:12px 16px;border-top:1px solid #293d4f}
        .input-row{display:flex;gap:10px}
        .msg-input{flex:1;background:#232e3c;border:none;border-radius:22px;padding:10px 16px;color:#fff;resize:none}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200}
        .modal-overlay.active{display:flex}
        .modal{background:#17212b;border-radius:20px;width:400px;max-width:90vw;padding:20px}
        .modal-header{display:flex;justify-content:space-between;margin-bottom:16px}
        .drawer{position:fixed;left:-280px;top:0;width:280px;height:100%;background:#17212b;z-index:151;transition:left 0.3s;padding:20px}
        .drawer.open{left:0}
        .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;display:none}
        .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;margin-right:4px}
        .tag-verified{background:#00d4ff20;color:#00d4ff}
        .tag-scam{background:#ff475720;color:#ff4757}
        .tag-fake{background:#f5a62320;color:#f5a623}
        .tag-bot{background:#a55eea20;color:#a55eea}
        .spam-modal{position:fixed;bottom:0;left:0;right:0;background:#17212b;padding:20px;border-top-left-radius:20px;border-top-right-radius:20px;z-index:300;transform:translateY(100%);transition:transform 0.3s}
        .spam-modal.open{transform:translateY(0)}
    </style>
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-box">
        <h2 style="text-align:center;margin-bottom:24px">📱 Telegram</h2>
        <div class="auth-tabs">
            <button id="loginTab" class="active">Вход</button>
            <button id="registerTab">Регистрация</button>
        </div>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="login()">Войти</button>
        </div>
        <div id="registerForm" style="display:none">
            <input type="text" id="regName" placeholder="Ваше имя">
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
        </div>
        <div id="authError" style="color:#e05c65;margin-top:12px;text-align:center"></div>
    </div>
</div>

<div id="app" class="app" style="display:none">
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="menu-btn" onclick="openDrawer()">☰</button>
            <div class="user-info" onclick="openProfile(currentUser.id)">
                <div id="sidebarName"></div>
                <div id="sidebarStars" style="font-size:12px;color:#f5a623"></div>
            </div>
            <button class="menu-btn" onclick="openNewChat()">✏️</button>
        </div>
        <div class="search">
            <input type="text" id="searchInput" placeholder="Поиск..." oninput="renderChats()">
        </div>
        <div class="chat-list" id="chatList"></div>
    </div>
    <div class="main">
        <div class="chat-header" id="chatHeader" style="display:none">
            <div class="avatar" id="chatAvatar"></div>
            <div style="flex:1;cursor:pointer" onclick="openProfile(currentChatId)">
                <div id="chatName"></div>
                <div id="chatTags" style="font-size:12px"></div>
            </div>
            <button class="menu-btn" onclick="openReport()" style="background:none">🚨</button>
        </div>
        <div id="emptyState" style="flex:1;display:flex;align-items:center;justify-content:center;color:#aaa">Выберите чат</div>
        <div id="chatView" style="display:none;flex-direction:column;flex:1">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div class="input-row">
                    <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
    <div style="text-align:center;margin-bottom:20px">
        <div id="drawerAvatar" class="avatar" style="width:80px;height:80px;margin:0 auto 12px">👤</div>
        <div id="drawerName"></div>
        <div id="drawerStars" style="color:#f5a623"></div>
    </div>
    <button onclick="closeDrawer(); openProfile(currentUser.id)" style="width:100%;margin-bottom:10px">👤 Мой профиль</button>
    <button onclick="closeDrawer(); openMyNFTs()" style="width:100%;margin-bottom:10px">🎁 Мои NFT</button>
    <button onclick="closeDrawer(); openShop()" style="width:100%;margin-bottom:10px">🏪 Магазин</button>
    <button onclick="logout()" style="width:100%;background:#e05c65">🚪 Выйти</button>
</div>

<div id="profileModal" class="modal-overlay">
    <div class="modal"><div class="modal-header"><h3 id="profileTitle"></h3><button onclick="closeModal('profileModal')">✕</button></div><div id="profileBody"></div></div>
</div>

<div id="newChatModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header"><h3>Новый чат</h3><button onclick="closeModal('newChatModal')">✕</button></div>
        <div style="display:flex;gap:8px;margin-bottom:16px">
            <button onclick="showNewChatSection('user')" style="flex:1">👤 Пользователь</button>
            <button onclick="showNewChatSection('channel')" style="flex:1">📢 Канал</button>
            <button onclick="showNewChatSection('group')" style="flex:1">👥 Группа</button>
        </div>
        <div id="newChatSection"></div>
    </div>
</div>

<div id="reportModal" class="modal-overlay">
    <div class="modal"><div class="modal-header"><h3>🚨 Жалоба</h3><button onclick="closeModal('reportModal')">✕</button></div>
        <select id="reportReason" style="width:100%;margin-bottom:12px;padding:10px;background:#0e1621;border:1px solid #293d4f;border-radius:12px;color:#fff">
            <option value="spam">Спам</option><option value="violence">Насилие</option><option value="fake">Фейк</option><option value="scam">Мошенничество</option>
        </select>
        <textarea id="reportComment" placeholder="Комментарий" style="width:100%;margin-bottom:12px;padding:10px;background:#0e1621;border:1px solid #293d4f;border-radius:12px;color:#fff"></textarea>
        <button onclick="submitReport()">Отправить</button>
    </div>
</div>

<div id="spamModal" class="spam-modal">
    <h3>🚫 Спам-блок</h3>
    <p id="spamReasonText"></p>
    <button onclick="openSpamInfoBot()">Подробнее (@SpamInfoBot)</button>
    <button onclick="closeSpamModal()" style="margin-top:8px;background:#555">Закрыть</button>
</div>

<script>
const API_URL = '';
let currentUser = null;
let currentChatId = null;
let allUsers = [];
let dialogs = [];
let myChats = [];
let collections = [];

// ============ AUTH ==========
document.getElementById('loginTab').onclick = () => { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; document.getElementById('loginTab').classList.add('active'); document.getElementById('registerTab').classList.remove('active'); };
document.getElementById('registerTab').onclick = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; document.getElementById('registerTab').classList.add('active'); document.getElementById('loginTab').classList.remove('active'); };

async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    if(!username || !password) return showError('Заполните поля');
    try {
        const res = await fetch(`${API_URL}/api/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ username, password }) });
        const data = await res.json();
        if(data.success) {
            currentUser = data.user;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            updateUI();
            await loadData();
            startPolling();
        } else showError(data.error);
    } catch(e) { showError('Ошибка'); }
}

async function register() {
    const name = document.getElementById('regName').value.trim();
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    if(!name || !username || !password) return showError('Заполните поля');
    try {
        const res = await fetch(`${API_URL}/api/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name, username, password }) });
        const data = await res.json();
        if(data.success) {
            document.getElementById('loginTab').click();
            document.getElementById('loginUsername').value = username;
            showError('Регистрация успешна! Войдите.', 'success');
        } else showError(data.error);
    } catch(e) { showError('Ошибка'); }
}

function showError(msg, type='error') {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.color = type === 'success' ? '#4dba87' : '#e05c65';
    setTimeout(() => el.textContent = '', 3000);
}

function updateUI() {
    document.getElementById('sidebarName').innerHTML = currentUser.name;
    document.getElementById('sidebarStars').innerHTML = `⭐ ${currentUser.stars}`;
    document.getElementById('drawerName').innerHTML = currentUser.name;
    document.getElementById('drawerStars').innerHTML = `⭐ ${currentUser.stars}`;
    document.getElementById('drawerAvatar').innerHTML = currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.name[0];
}

async function loadData() {
    const [usersRes, dialogsRes, chatsRes, collectionsRes] = await Promise.all([
        fetch(`${API_URL}/api/users`),
        fetch(`${API_URL}/api/dialogs/${currentUser.id}`),
        fetch(`${API_URL}/api/my/chats/${currentUser.id}`),
        fetch(`${API_URL}/api/nft/collections`)
    ]);
    allUsers = await usersRes.json();
    dialogs = await dialogsRes.json();
    myChats = await chatsRes.json();
    collections = await collectionsRes.json();
    renderChats();
}

function getUserDisplay(user) {
    if(user.frozen) return { name: '❄️ Замороженный аккаунт', avatar: '👻', avatarClass: 'frozen-avatar' };
    if(user.banned) return { name: '🗑️ Удалённый аккаунт', avatar: '🕊️', avatarClass: 'banned-avatar' };
    return { name: user.name, avatar: user.avatar || user.name[0], avatarClass: '' };
}

function renderChats() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let items = [];
    for(const dialog of dialogs) {
        const otherId = dialog.user1 === currentUser.id ? dialog.user2 : dialog.user1;
        const user = allUsers.find(u => u.id === otherId);
        if(user) items.push({ type: 'user', id: user.id, name: getUserDisplay(user).name, avatar: getUserDisplay(user).avatar, avatarClass: getUserDisplay(user).avatarClass });
    }
    for(const chat of myChats) {
        items.push({ type: chat.type, id: chat.id, name: chat.title, avatar: chat.type === 'channel' ? '📢' : '👥', avatarClass: '' });
    }
    const filtered = search ? items.filter(i => i.name.toLowerCase().includes(search)) : items;
    document.getElementById('chatList').innerHTML = filtered.map(i => `
        <div class="chat-item" onclick="openChat('${i.type}', '${i.id}')">
            <div class="avatar ${i.avatarClass}">${i.avatar}</div>
            <div><strong>${escapeHtml(i.name)}</strong></div>
        </div>
    `).join('');
}

async function openChat(type, id) {
    if(type === 'user') {
        await fetch(`${API_URL}/api/dialogs`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user1: currentUser.id, user2: id }) });
        currentChatId = id;
    } else {
        await fetch(`${API_URL}/api/chats/${id}/join`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId: currentUser.id }) });
        currentChatId = `chat_${id}`;
    }
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('chatView').style.display = 'flex';
    document.getElementById('chatHeader').style.display = 'flex';
    const user = allUsers.find(u => u.id === id);
    const display = user ? getUserDisplay(user) : { name: id, avatar: '📢', avatarClass: '' };
    document.getElementById('chatName').innerHTML = display.name;
    document.getElementById('chatAvatar').innerHTML = display.avatar;
    document.getElementById('chatAvatar').className = `avatar ${display.avatarClass}`;
    const tagsHtml = (user?.tags || []).map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
    document.getElementById('chatTags').innerHTML = tagsHtml;
    await loadMessages();
}

async function loadMessages() {
    if(!currentChatId) return;
    const isUserChat = !currentChatId.startsWith('chat_');
    let url;
    if(isUserChat) url = `${API_URL}/api/messages/${currentChatId}?currentUserId=${currentUser.id}`;
    else url = `${API_URL}/api/chats/${currentChatId.replace('chat_', '')}/messages`;
    const res = await fetch(url);
    const msgs = await res.json();
    const container = document.getElementById('messages');
    if(msgs.length === 0) { container.innerHTML = '<div style="text-align:center;color:#aaa;padding:40px">Напишите первое сообщение</div>'; return; }
    container.innerHTML = msgs.map(msg => {
        const isOut = msg.fromUserId === currentUser.id;
        return `<div class="message ${isOut ? 'out' : 'in'}"><div class="msg-bubble">${escapeHtml(msg.text)}<div style="font-size:10px;color:#aaa;margin-top:4px">${new Date(msg.ts).toLocaleTimeString()}</div></div></div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text || !currentChatId) return;
    const isUserChat = !currentChatId.startsWith('chat_');
    let url, body;
    if(isUserChat) {
        url = `${API_URL}/api/messages`;
        body = { from: currentUser.id, to: currentChatId, type: 'text', text };
    } else {
        url = `${API_URL}/api/chats/${currentChatId.replace('chat_', '')}/messages`;
        body = { fromUserId: currentUser.id, type: 'text', text };
    }
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if(res.status === 403) {
        const err = await res.json();
        if(err.error === 'spam_blocked') {
            document.getElementById('spamReasonText').innerHTML = `Причина: ${err.reason}<br>${err.until ? `До: ${new Date(err.until).toLocaleString()}` : 'Навсегда'}`;
            document.getElementById('spamModal').classList.add('open');
            return;
        }
        if(err.error === 'frozen') { alert('❄️ Аккаунт заморожен'); return; }
        if(err.error === 'banned') { alert('⛔ Аккаунт заблокирован'); return; }
    }
    input.value = '';
    await loadMessages();
    await loadData();
}

function openSpamInfoBot() {
    window.open(`https://t.me/SpamInfoBot?start=spam_${currentUser.id}`, '_blank');
}
function closeSpamModal() { document.getElementById('spamModal').classList.remove('open'); }

async function openProfile(userId) {
    const res = await fetch(`${API_URL}/api/users/${userId}`);
    const user = await res.json();
    if(!user) return;
    const display = getUserDisplay(user);
    document.getElementById('profileTitle').innerHTML = display.name;
    document.getElementById('profileBody').innerHTML = `
        <div style="text-align:center;margin-bottom:20px">
            <div class="avatar ${display.avatarClass}" style="width:80px;height:80px;font-size:32px;margin:0 auto 12px">${display.avatar}</div>
            <div><strong>${escapeHtml(display.name)}</strong></div>
            <div>@${escapeHtml(user.username)}</div>
            <div style="margin-top:8px;color:#f5a623">⭐ ${user.stars}</div>
            <div style="margin-top:8px">${(user.tags || []).map(t => `<span class="tag tag-${t}">${t}</span>`).join('')}</div>
            ${user.bio ? `<div style="margin-top:12px;padding:12px;background:#0e1621;border-radius:12px">${escapeHtml(user.bio)}</div>` : ''}
        </div>
        ${userId === currentUser.id ? '<button onclick="editProfile()" style="width:100%">✏️ Редактировать</button>' : '<button onclick="closeModal(\'profileModal\')">Закрыть</button>'}
    `;
    openModal('profileModal');
}

function editProfile() {
    const newName = prompt('Новое имя', currentUser.name);
    if(newName) {
        fetch(`${API_URL}/api/users/${currentUser.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name: newName }) });
        currentUser.name = newName;
        updateUI();
        closeModal('profileModal');
        loadData();
    }
}

// ============ НОВЫЙ ЧАТ ==========
function openNewChat() { openModal('newChatModal'); showNewChatSection('user'); }
function showNewChatSection(type) {
    if(type === 'user') {
        document.getElementById('newChatSection').innerHTML = `<input type="text" id="searchUserInput" placeholder="Имя пользователя..." style="margin-bottom:12px"><div id="userSearchResults"></div>`;
        document.getElementById('searchUserInput').addEventListener('input', searchUsers);
    } else {
        document.getElementById('newChatSection').innerHTML = `<input id="chatTitle" placeholder="Название"><textarea id="chatDesc" placeholder="Описание" style="margin-top:12px"></textarea><button onclick="createChat('${type}')" style="margin-top:12px">Создать ${type === 'channel' ? 'канал' : 'группу'}</button>`;
    }
}
async function searchUsers() {
    const q = document.getElementById('searchUserInput').value.toLowerCase();
    if(q.length < 2) return;
    const users = allUsers.filter(u => u.name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q));
    document.getElementById('userSearchResults').innerHTML = users.map(u => `<div style="padding:12px;background:#232e3c;border-radius:12px;margin-bottom:8px;cursor:pointer" onclick="startChat('${u.id}')">${u.name} (@${u.username})</div>`).join('');
}
async function startChat(userId) {
    await fetch(`${API_URL}/api/dialogs`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ user1: currentUser.id, user2: userId }) });
    closeModal('newChatModal');
    await loadData();
    openChat('user', userId);
}
async function createChat(type) {
    const title = document.getElementById('chatTitle').value;
    const desc = document.getElementById('chatDesc')?.value || '';
    if(!title) return alert('Введите название');
    await fetch(`${API_URL}/api/chats`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ type, title, description: desc, creatorId: currentUser.id }) });
    closeModal('newChatModal');
    await loadData();
}

// ============ ЖАЛОБЫ ==========
function openReport() { if(currentChatId && !currentChatId.startsWith('chat_')) openModal('reportModal'); else alert('Пожаловаться можно только на пользователя'); }
async function submitReport() {
    await fetch(`${API_URL}/api/reports`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ from: currentUser.id, againstId: currentChatId, type: 'user', reason: document.getElementById('reportReason').value, comment: document.getElementById('reportComment').value }) });
    alert('Жалоба отправлена');
    closeModal('reportModal');
}

// ============ МАГАЗИН NFT ==========
async function openShop() { alert('Магазин подарков'); }
async function openMyNFTs() { alert('Ваши NFT'); }

function logout() { currentUser = null; location.reload(); }
function startPolling() { setInterval(() => { if(currentChatId) loadMessages(); loadData(); }, 3000); }
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').style.display = 'block'; }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').style.display = 'none'; }
function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
</script>
</body>
</html>
